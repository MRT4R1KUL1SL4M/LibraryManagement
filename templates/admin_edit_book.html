{% extends "layout.html" %}

{% block content %}
<div class="flex items-center justify-center min-h-screen bg-gray-100">
    <div class="w-full max-w-lg p-8 space-y-6 bg-white rounded-lg shadow-md">
        <h2 class="text-2xl font-bold text-center">Edit Book Information</h2>
        <form method="POST" action="{{ url_for('edit_book', book_id=book.id) }}" class="space-y-6">
            <div>
                <label for="title" class="block text-sm font-medium text-gray-700">Book Title</label>
                <input id="title" name="title" type="text" value="{{ book.title }}" required class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm">
            </div>
            <div>
                <label for="author_name" class="block text-sm font-medium text-gray-700">Author Name</label>
                <input id="author_name" name="author_name" type="text" value="{{ book.author }}" required class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm">
            </div>
            <div>
                <label for="category_name" class="block text-sm font-medium text-gray-700">Category Name</label>
                <input id="category_name" name="category_name" type="text" value="{{ book.category }}" required class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm">
            </div>
            <div>
                <label for="publisher_name" class="block text-sm font-medium text-gray-700">Publisher Name</label>
                <input id="publisher_name" name="publisher_name" type="text" value="{{ book.publisher }}" required class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm">
            </div>
             <div>
                <label for="total_copies" class="block text-sm font-medium text-gray-700">Total Copies</label>
                <input type="number" id="total_copies" name="total_copies" min="1" value="{{ book.total_copies }}" required class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm">
            </div>
            <div class="flex items-center justify-between pt-4">
                <a href="{{ url_for('manage_books') }}" class="py-2 px-6 bg-gray-200 text-gray-800 rounded-md hover:bg-gray-300">Cancel</a>
                <button type="submit" class="py-2 px-6 text-white bg-indigo-600 rounded-md hover:bg-indigo-700">
                    Update
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
